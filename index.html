<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yagó | Un click y ya llegó</title>
    <link rel="icon" type="image/png" href="Favicon.png">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome para Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#001B44',
                            orange: '#FF8C00',
                            accent: '#3B82F6',
                        }
                    },
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .product-card { transition: all 0.2s ease-in-out; }
        .product-card:active { transform: scale(0.95); }
        .bottom-nav { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-white text-slate-900 pb-24">

    <!-- HEADER / BUSCADOR -->
    <header id="main-header" class="sticky top-0 z-50 bg-white px-4 pt-4 pb-2 transition-all duration-300">
        <div class="flex justify-between items-center mb-4">
          <div class="flex items-center">
    <img src="https://lh3.googleusercontent.com/u/0/d/1tVaC3uUs2xuMgzO8IxCTJ3k2sWDZ7a51" alt="Yagó Logo" class="h-10 w-auto object-contain">
</div>
            <div class="flex items-center space-x-3 text-slate-600">
                <button class="relative p-2 bg-slate-50 rounded-full">
                    <i class="fa-regular fa-bell"></i>
                    <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                </button>
                <button class="p-2 bg-slate-50 rounded-full">
                    <i class="fa-solid fa-cart-shopping"></i>
                </button>
            </div>
        </div>
        <!-- Barra de búsqueda -->
        <div class="relative group">
            <input 
                type="text" 
                id="search-input"
                placeholder="¿Qué buscas hoy en Yagó?" 
                class="w-full bg-slate-100 border-none rounded-2xl py-3.5 pl-12 pr-4 text-sm focus:ring-2 focus:ring-brand-accent transition-all outline-none"
            >
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-slate-400"></i>
        </div>
    </header>

    <!-- CARRUSEL DE CATEGORÍAS -->
    <div class="overflow-x-auto no-scrollbar px-4 py-4 mt-2">
        <div id="categories-container" class="flex space-x-3 min-w-max">
            <!-- Se genera con JS -->
        </div>
    </div>

    <!-- BANNER PROMO (Mascota Placeholder) -->
    <section class="px-4 py-2">
        <div class="relative w-full rounded-[2.5rem] overflow-hidden bg-gradient-to-br from-brand-blue to-blue-900 p-7 text-white h-48 flex items-center shadow-xl shadow-blue-900/10">
            <div class="relative z-10 w-2/3">
                <span class="text-[10px] font-bold uppercase tracking-widest text-brand-orange mb-2 block">CALIDAD GARANTIZADA</span>
                <h2 class="text-xl font-bold mb-1 leading-tight">Mejora tu hogar<br>con Yagó</h2>
                <p class="text-blue-200 text-[10px] mb-4">Recibe en la puerta de tu casa</p>
                <button class="bg-brand-orange text-white px-5 py-2 rounded-xl text-xs font-bold flex items-center space-x-2">
                    <span>Ver catálogo</span>
                    <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
                </button>
            </div>
            <!-- Mascota Illustration Placeholder -->
           <div class="absolute right-2 bottom-[0px] h-48 w-60 flex items-center justify-end pointer-events-none">
<img src="https://lh3.googleusercontent.com/d/1Yp4dUwC85wvi5pmZcid3ZFjc377h7KFw"
         alt="Nutria Courier Yagó" 
         class="h-full w-auto object-contain drop-shadow-2xl translate-y-2">
</div>
            </div>
        </div>
    </section>

    <!-- GRID DE PRODUCTOS -->
    <main class="px-4 py-6">
        <div class="flex items-center justify-between mb-6">
            <h2 id="category-title" class="text-lg font-bold text-brand-blue">
                Tendencias en Todos
            </h2>
            <span class="text-xs font-medium text-slate-400">Ver todos</span>
        </div>

        <div id="product-grid" class="grid grid-cols-2 gap-4">
            <!-- Se genera con JS -->
        </div>
    </main>

    <!-- BANNER SOPORTE (Mascota Icon) -->
    <section class="px-4 py-4 mb-8">
        <div class="bg-slate-50 rounded-3xl p-6 border border-slate-100 flex items-center space-x-4 active:bg-slate-100 transition-colors cursor-pointer">
            <div class="w-14 h-14 bg-white rounded-2xl shadow-sm flex items-center justify-center border border-slate-100 shrink-0 text-3xl">
                🦦
            </div>
            <div class="flex-1">
                <h4 class="font-bold text-sm text-brand-blue">¿Dudas con tu compra?</h4>
                <p class="text-[11px] text-slate-500">Chatea conmigo por WhatsApp</p>
            </div>
            <i class="fa-solid fa-chevron-right text-slate-300"></i>
        </div>
    </section>

    <!-- BARRA NAVEGACIÓN INFERIOR -->
    <nav class="fixed bottom-0 left-0 right-0 z-50 bg-white/80 bottom-nav border-t border-slate-100 px-8 py-3 flex justify-between items-center pb-8">
        <button class="flex flex-col items-center space-y-1 text-brand-accent">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[10px] font-bold">Inicio</span>
        </button>
        <button class="flex flex-col items-center space-y-1 text-slate-400">
            <i class="fa-solid fa-bag-shopping text-xl"></i>
            <span class="text-[10px] font-medium">Tienda</span>
        </button>
        <button class="flex flex-col items-center space-y-1 text-slate-400">
            <i class="fa-regular fa-heart text-xl"></i>
            <span class="text-[10px] font-medium">Favoritos</span>
        </button>
        <button class="flex flex-col items-center space-y-1 text-slate-400">
            <i class="fa-regular fa-user text-xl"></i>
            <span class="text-[10px] font-medium">Perfil</span>
        </button>
    </nav>

    <!-- FOOTER -->
    <footer class="px-8 py-10 text-center">
        <p class="text-[10px] text-slate-300 font-medium tracking-[0.2em] uppercase">
            Yagó • Un click y ya llegó
        </p>
    </footer>

    <!-- LÓGICA DE LA TIENDA -->
    <script>
        const products = [
            { id: 1, name: "Smartwatch Pro Z", price: 189900, oldPrice: 245000, category: "Tecno", rating: 4.8, tag: "Top", image: "https://images.unsplash.com/photo-1546868871-7041f2a55e12?auto=format&fit=crop&q=80&w=400" },
            { id: 2, name: "Masajeador Cervical", price: 125000, oldPrice: 160000, category: "Salud", rating: 4.9, tag: "Nuevo", image: "https://images.unsplash.com/photo-1519823551278-64ac92734fb1?auto=format&fit=crop&q=80&w=400" },
            { id: 3, name: "Secador 3 en 1 Pro", price: 89000, oldPrice: 110000, category: "Belleza", rating: 4.7, tag: "Hot", image: "https://images.unsplash.com/photo-1522338140262-f46f5912018a?auto=format&fit=crop&q=80&w=400" },
            { id: 4, name: "Mini Picatodo USB", price: 55000, oldPrice: 75000, category: "Hogar", rating: 4.6, tag: "-30%", image: "https://images.unsplash.com/photo-1585238341267-1cfec2046a55?auto=format&fit=crop&q=80&w=400" },
            { id: 5, name: "Audífonos Gamer RGB", price: 145000, oldPrice: 190000, category: "Tecno", rating: 4.9, tag: "Pro", image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&q=80&w=400" },
            { id: 6, name: "Nebulizador Portátil", price: 195000, oldPrice: 220000, category: "Salud", rating: 4.8, tag: "Dropi", image: "https://images.unsplash.com/photo-1631549916768-4119b2e5f926?auto=format&fit=crop&q=80&w=400" }
        ];

        const categories = [
            { name: 'Todos', icon: 'fa-filter' },
            { name: 'Salud', icon: 'fa-heart-pulse' },
            { name: 'Belleza', icon: 'fa-sparkles' },
            { name: 'Hogar', icon: 'fa-house-chimney' },
            { name: 'Tecno', icon: 'fa-laptop' }
        ];

        let activeCategory = 'Todos';
        let searchQuery = '';

        function renderCategories() {
            const container = document.getElementById('categories-container');
            container.innerHTML = categories.map(cat => `
                <button onclick="setCategory('${cat.name}')" class="flex items-center space-x-2 px-5 py-2.5 rounded-2xl text-sm font-medium transition-all ${activeCategory === cat.name ? 'bg-brand-blue text-white shadow-lg' : 'bg-slate-50 text-slate-500'}">
                    <i class="fa-solid ${cat.icon}"></i>
                    <span>${cat.name}</span>
                </button>
            `).join('');
        }

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            const filtered = products.filter(p => 
                (activeCategory === 'Todos' || p.category === activeCategory) &&
                (p.name.toLowerCase().includes(searchQuery.toLowerCase()))
            );

            document.getElementById('category-title').innerText = `Tendencias en ${activeCategory}`;

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-2 py-10 text-center text-slate-400 italic">No hay productos que coincidan...</div>`;
                return;
            }

            grid.innerHTML = filtered.map(p => `
                <div class="product-card bg-white rounded-3xl border border-slate-100 p-3 shadow-sm">
                    <div class="relative aspect-square rounded-2xl overflow-hidden bg-slate-50 mb-3">
                        <img src="${p.image}" alt="${p.name}" class="w-full h-full object-cover">
                        <div class="absolute top-2 right-2 p-1.5 bg-white/80 rounded-full text-slate-400">
                            <i class="fa-regular fa-heart text-xs"></i>
                        </div>
                        <div class="absolute bottom-2 left-2 bg-brand-accent text-white text-[9px] font-bold px-2 py-0.5 rounded-lg">
                            ${p.tag}
                        </div>
                    </div>
                    <div class="space-y-1">
                        <div class="flex items-center text-brand-orange text-[9px] font-bold uppercase">
                            <i class="fa-solid fa-star mr-1"></i> ${p.rating}
                        </div>
                        <h3 class="text-xs font-semibold text-slate-800 leading-tight line-clamp-2 h-8">${p.name}</h3>
                        <div class="pt-1">
                            <p class="text-[10px] text-slate-400 line-through">$${p.oldPrice.toLocaleString()}</p>
                            <div class="flex items-center justify-between">
                                <span class="text-sm font-bold text-slate-900">$${p.price.toLocaleString()}</span>
                                <button class="bg-slate-50 p-2 rounded-xl text-brand-blue active:bg-brand-blue active:text-white transition-colors">
                                    <i class="fa-solid fa-plus text-xs"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function setCategory(cat) {
            activeCategory = cat;
            renderCategories();
            renderProducts();
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderProducts();
        });

        // Efecto scroll en header
        window.addEventListener('scroll', () => {
            const header = document.getElementById('main-header');
            if (window.scrollY > 20) {
                header.classList.add('shadow-md', 'bg-white/95', 'backdrop-blur-md');
            } else {
                header.classList.remove('shadow-md', 'bg-white/95', 'backdrop-blur-md');
            }
        });

        // Inicializar
        renderCategories();
        renderProducts();
    </script>
</body>
</html>
